<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Evaluaciones V2 - Infocal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="dashboard-container">
        <header>
            <h1>Gestor de Calificaciones V2</h1>
            <p>Parciales y evaluaciones por materia</p>
            <nav class="main-nav">
                <a href="/">Tabla de Notas</a>
                <a href="/students.html">Estudiantes</a>
                <a href="/evaluations.html" class="active">Evaluaciones</a>
                <a href="/config.html">Configuracion</a>
            </nav>
        </header>

        <main class="students-layout">
            <section class="panel">
                <h2>Materia del Grupo</h2>
                <form class="stack-form">
                    <select id="assignmentSelect" required></select>
                </form>
                <p id="assignmentHint" class="helper-text">Selecciona una materia asociada a un grupo.</p>
            </section>

            <section class="panel">
                <h2>Crear Parcial</h2>
                <form id="termForm" class="stack-form">
                    <input type="text" id="termName" placeholder="Nombre del parcial (Ej: 1er Parcial)" required>
                    <input type="number" id="officialWeight" min="0.01" max="100" step="0.01" value="25" placeholder="Valor oficial">
                    <button type="submit">Crear parcial</button>
                </form>
            </section>
        </main>

        <section class="panel students-panel">
            <h2>Parciales Registrados</h2>
            <div id="termsList" class="item-list"></div>
        </section>
    </div>
    <script src="evaluations.js"></script>
</body>

</html>
