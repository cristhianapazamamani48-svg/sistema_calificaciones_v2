<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Evaluaciones V2 - Infocal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="dashboard-container">
        <header>
            <h1>Gestor de Calificaciones V2</h1>
            <p>Sistema personal de control academico docente</p>
            <nav class="main-nav">
                <a href="/">Tabla de Notas</a>
                <a href="/students.html">Estudiantes</a>
                <a href="/evaluations.html" class="active">Evaluaciones</a>
                <a href="/config.html">Configuracion</a>
            </nav>
        </header>

        <div class="table-wrapper narrow-panel">
            <h2>Crear Nueva Evaluacion</h2>

            <form id="evaluationForm" class="stack-form">
                <input type="text" id="evaluationName" placeholder="Nombre de la evaluacion (Ej: Practica 3)" required>
                <select id="categorySelect" required></select>
                <button type="submit">Crear Evaluacion</button>
            </form>

            <h3>Evaluaciones por Categoria</h3>
            <div id="evaluationsContainer"></div>
        </div>
    </div>
    <script src="evaluations.js"></script>
</body>

</html>
