<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Calificaciones V2 - Infocal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="dashboard-container">
        <header>
            <h1>Gestor de Calificaciones V2</h1>
            <p>Tabla de notas por grupo, materia y parcial</p>
            <nav class="main-nav">
                <a href="/" class="active">Tabla de Notas</a>
                <a href="/students.html">Estudiantes</a>
                <a href="/evaluations.html">Evaluaciones</a>
                <a href="/config.html">Configuracion</a>
            </nav>
        </header>

        <section class="panel dashboard-controls">
            <div class="control-field">
                <label for="assignmentSelect">Grupo y materia</label>
                <select id="assignmentSelect"></select>
            </div>
            <div class="control-field">
                <label for="termSelect">Parcial</label>
                <select id="termSelect"></select>
            </div>
            <div class="control-status">
                <strong id="contextTitle">Selecciona una materia y parcial</strong>
                <span id="contextStatus">La tabla se cargara con los estudiantes y evaluaciones configuradas.</span>
            </div>
        </section>

        <div class="table-wrapper">
            <table id="gradesTable">
                <thead>
                    <tr id="categoryRow">
                        <th rowspan="2" class="sticky-col">Estudiante</th>
                    </tr>
                    <tr id="evaluationRow"></tr>
                </thead>
                <tbody id="studentsBody">
                    <tr>
                        <td class="empty-table" colspan="2">Selecciona una materia y parcial para cargar notas.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
