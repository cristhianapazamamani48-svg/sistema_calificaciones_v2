<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Calificaciones - Infocal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="dashboard-container">
        <header>
            <h1>Gestor de Calificaciones</h1>
            <p>1er Año Mañana - Sistemas Informáticos</p>
            <nav style="margin-top: 1rem; margin-bottom: 1.5rem;">
                <a href="/"
                    style="color: var(--primary); text-decoration: none; margin-right: 20px; font-weight: bold; font-size: 1.1rem; border-bottom: 2px solid var(--primary); padding-bottom: 5px;">📊
                    Tabla de Notas</a>
                <a href="/students.html"
                    style="color: var(--text-muted); text-decoration: none; margin-right: 20px; font-weight: bold; font-size: 1.1rem; transition: color 0.3s;">👥
                    Gestión de Estudiantes</a>
                <a href="/evaluations.html"
                    style="color: var(--text-muted); text-decoration: none; font-weight: bold; font-size: 1.1rem; transition: color 0.3s;">📝
                    Gestión de Evaluaciones</a>
            </nav>

        </header>

        <div class="table-wrapper">
            <table id="gradesTable">
                <thead>
                    <tr id="categoryRow">
                        <th rowspan="2" class="sticky-col">Estudiante</th>
                        <!-- Las categorías (Ej: Prácticas 40%) aparecerán aquí -->
                    </tr>
                    <tr id="evaluationRow">
                        <!-- Los ítems (Ej: Práctica 1) aparecerán aquí -->
                    </tr>
                </thead>
                <tbody id="studentsBody">
                    <!-- Los estudiantes y sus casillas de Excel aparecerán aquí -->
                </tbody>
            </table>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
