<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Estudiantes V2 - Infocal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="dashboard-container">
        <header>
            <h1>Gestor de Calificaciones V2</h1>
            <p>Inscripcion de estudiantes por grupo</p>
            <nav class="main-nav">
                <a href="/">Tabla de Notas</a>
                <a href="/students.html" class="active">Estudiantes</a>
                <a href="/evaluations.html">Evaluaciones</a>
                <a href="/config.html">Configuracion</a>
                <a href="/reports.html">Reportes</a>
                <a href="/users.html" class="superadmin-only">Usuarios</a>
                <a href="#" id="logoutLink">Salir</a>
            </nav>
            <p id="currentUser" class="user-badge"></p>
        </header>

        <main class="students-layout">
            <section class="panel">
                <h2>Grupo de Trabajo</h2>
                <form class="stack-form">
                    <select id="groupSelect" required></select>
                </form>
                <p id="groupHint" class="helper-text">Selecciona un grupo para ver o registrar estudiantes.</p>
            </section>

            <section class="panel">
                <h2>Matricular Estudiante</h2>
                <form id="studentForm" class="stack-form">
                    <input type="text" id="studentName" placeholder="Nombre completo del estudiante" required>
                    <input type="text" id="studentPhone" placeholder="Celular (opcional)">
                    <textarea id="studentNotes" rows="3" placeholder="Observaciones (opcional)"></textarea>
                    <button type="submit">Matricular en el grupo</button>
                </form>
            </section>
        </main>

        <section class="panel students-panel">
            <h2>Estudiantes del Grupo</h2>
            <ul id="studentsList"></ul>
        </section>
    </div>
    <script src="auth.js"></script>
    <script src="students.js"></script>
</body>

</html>
