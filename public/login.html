<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Acceso V2 - Infocal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="login-shell">
        <section class="panel login-panel">
            <h1>Gestor de Calificaciones V2</h1>
            <p>Acceso docente</p>
            <form id="loginForm" class="stack-form">
                <input type="email" id="email" value="docente@local.test" placeholder="Correo" required>
                <input type="password" id="password" value="1234" placeholder="Contrasena" required>
                <button type="submit">Ingresar</button>
            </form>
            <p id="loginMessage" class="helper-text">Docente: docente@local.test / 1234 | Superadmin: admin@local.test / 1234</p>
        </section>
    </main>
    <script src="auth.js"></script>
    <script src="login.js"></script>
</body>

</html>
